name: Release

# Publishes to npm and cuts a GitHub Release when a version tag is pushed.
# Cut a release by bumping the version in package.json, committing, and
# pushing a vX.Y.Z tag, or run `just release X.Y.Z`.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC: npm trusted publishing (no NPM_TOKEN secret)

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Re-run the full gate: never publish a tag that doesn't pass.
      - run: pnpm run build
      - run: pnpm test

      # Guard: the tag must match the version in package.json.
      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi
          echo "Releasing $pkg"

      # npm (not pnpm) is required for OIDC trusted publishing.
      - name: Upgrade npm (for OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --ignore-scripts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
